---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: piper-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /home/storage/ns/receptify/piper
---
# tts-service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-service
  namespace: receptify
  labels:
    app: tts-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tts-service
  template:
    metadata:
      labels:
        app: tts-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: tts-service
          image: ghcr.io/danipopa/tts-service:latest
          ports:
            - containerPort: 9093
          env:
            - name: PIPER_BIN
              value: /piper/piper
            - name: PIPER_MODEL
              value: /piper/en_US-lessac-medium.onnx
            - name: OUTPUT_SAMPLE_RATE
              value: "8000"
            - name: LOG_LEVEL
              value: INFO
          volumeMounts:
            - name: piper-model
              mountPath: /piper
          readinessProbe:
            httpGet:
              path: /ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9093
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: piper-model
          persistentVolumeClaim:
            claimName: piper-model-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tts-service
  namespace: receptify
spec:
  selector:
    app: tts-service
  ports:
    - port: 9093
      targetPort: 9093
---
# PVC for Piper binary + model (ReadOnlyMany or ReadWriteOnce)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: piper-model-pvc
  namespace: receptify
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  volumeName: piper-pv
