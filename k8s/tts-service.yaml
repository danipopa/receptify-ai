# tts-service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-service
  namespace: receptify
  labels:
    app: tts-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tts-service
  template:
    metadata:
      labels:
        app: tts-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: tts-service
          image: ghcr.io/danipopa/tts-service:latest
          ports:
            - containerPort: 9093
          env:
            - name: PIPER_BIN
              value: /usr/local/bin/piper
            - name: PIPER_MODEL
              value: /opt/piper/en_US-lessac-medium.onnx
            - name: OUTPUT_SAMPLE_RATE
              value: "8000"
            - name: LOG_LEVEL
              value: INFO
          readinessProbe:
            httpGet:
              path: /ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9093
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: tts-service
  namespace: receptify
spec:
  selector:
    app: tts-service
  ports:
    - port: 9093
      targetPort: 9093
