# Secret values must be base64-encoded.
# Generate: echo -n 'your_value' | base64
#
# Apply with:
#   kubectl apply -f k8s/secrets.yaml -n receptify

---
apiVersion: v1
kind: Secret
metadata:
  name: receptify-api-secret
  namespace: receptify
type: Opaque
data:
  # echo -n 'receptify' | base64
  DB_USERNAME: cmVjZXB0aWZ5
  # echo -n 'CHANGE_ME' | base64
  DB_PASSWORD: Q0hBTkdFX01F
  # echo -n 'CHANGE_ME_64_char_random_secret' | base64
  JWT_SECRET: Q0hBTkdFX01FXzY0X2NoYXJfcmFuZG9tX3NlY3JldA==
  # echo -n 'your_rails_master_key' | base64
  RAILS_MASTER_KEY: Q0hBTkdFX01F
