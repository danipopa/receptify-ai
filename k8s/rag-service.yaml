---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rag-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /home/storage/ns/receptify/rag
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-pvc
  namespace: receptify
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  volumeName: rag-pv
---
# rag-service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: receptify
  labels:
    app: rag-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: rag-service
          image: ghcr.io/danipopa/rag-service:latest
          ports:
            - containerPort: 9091
          env:
            - name: FAQ_FILE
              value: /faq/ai-ivr-context.txt
            - name: EMBEDDING_MODEL
              value: nomic-embed-text
            - name: LLM_MODEL
              value: llama3.2:1b
            - name: OLLAMA_HOST
              value: ollama:11434
            - name: OLLAMA_TIMEOUT
              value: "60"
            - name: LLM_NUM_PREDICT
              value: "48"
            - name: LLM_TEMPERATURE
              value: "0.1"
            - name: LOG_LEVEL
              value: INFO
          volumeMounts:
            - name: rag-data
              mountPath: /faq
          readinessProbe:
            httpGet:
              path: /ready
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9091
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: rag-data
          persistentVolumeClaim:
            claimName: rag-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: receptify
spec:
  selector:
    app: rag-service
  ports:
    - port: 9091
      targetPort: 9091
